name: salah_tracker
description: A modern Salah tracking app — track your 5 daily prayers with offline-first support and cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # Local database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Supabase
  supabase_flutter: ^2.4.0

  # Charts
  fl_chart: ^0.67.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Fonts & styling
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Shared preferences (settings)
  shared_preferences: ^2.2.3

  # Path provider
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
